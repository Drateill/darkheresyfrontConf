# Appliqué UNE SEULE FOIS manuellement — pas géré par ArgoCD lui-même.
# Permet à ArgoCD d'accéder au repo GitHub privé.
#
# 1. Créer un Personal Access Token GitHub avec le scope "repo" :
#    https://github.com/settings/tokens
#
# 2. Remplir password, puis :
#    kubectl apply -f argocd/repo-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: darkheresyfrontconf-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/Drateill/darkheresyfrontConf.git
  username: Drateill
  password: REPLACE_WITH_GITHUB_PAT
