apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: darkheresy

# Tags mis à jour automatiquement par la CI (ci-api.yml / ci-front.yml)
images:
  - name: drateil/dhfrontnginx
    newTag: latest
  - name: drateil/darkheresyback
    newTag: latest

resources:
  # Namespace
  - namespace.yaml
  # Config & Secrets
  - configmap.yaml
  - secrets.yaml
  # MongoDB (in-cluster)
  - mongo-pv.yaml
  - mongodb-pvc.yaml
  - mongodb-deployment.yaml
  - mongodb-nodeport-svc.yaml
  # Application
  - deployment.yaml
  - service.yaml
  - ingress.yaml
